<!-- templates/admin/settings/faq_form.html -->
{% extends 'shared/adminbase.html' %}

{% block title %}
  {% if faq %}Edit FAQ{% else %}Add FAQ{% endif %} | Settings | Enor Admin
{% endblock %}
{% block header %}
  {% if faq %}Edit FAQ{% else %}Add New FAQ{% endif %}
{% endblock %}

{% block content %}
<form method="post" class="max-w-3xl">
  {% csrf_token %}
  <div class="bg-white rounded-lg shadow p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Question *</label>
      <input type="text" name="question" required
             value="{{ faq.question|default:'' }}"
             class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-brand-red">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Answer *</label>
      <textarea name="answer" rows="4" required
                class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-brand-red">{{ faq.answer|default:'' }}</textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Display Order</label>
        <input type="number" name="order" value="{{ faq.order|default:'0' }}"
               class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-brand-red">
      </div>
      <div class="flex items-center">
        <input type="checkbox" id="is_active" name="is_active"
               {% if faq and faq.is_active or not faq %}checked{% endif %}
               class="h-4 w-4 text-brand-red focus:ring-brand-red">
        <label for="is_active" class="ml-2 text-sm text-gray-700">Active</label>
      </div>
    </div>

    <div class="pt-4 border-t flex justify-end gap-3">
      <a href="{% url 'admin_faq_list' %}"
         class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50">Cancel</a>
      <button type="submit"
              class="px-4 py-2 bg-brand-red text-white rounded hover:bg-brand-red-dark">
        {% if faq %}Update FAQ{% else %}Create FAQ{% endif %}
      </button>
    </div>
  </div>
</form>
{% endblock %}
