{% extends 'shared/adminbase.html' %}
{% block title %}{% if style %}Edit{% else %}Add{% endif %} Style | Enor Admin{% endblock %}
{% block header %}{% if style %}Edit Style: {{ style.name }}{% else %}Add New Style{% endif %}{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <form method="post" class="bg-white rounded-lg shadow p-6 space-y-6">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Style Name *</label>
      <input type="text" name="name" required value="{{ style.name|default:'' }}"
             class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-brand-red"
             placeholder="e.g. Regular, Slim Fit, Oversized">
    </div>
    <div class="flex justify-end gap-3 pt-4 border-t">
      <a href="{% url 'admin_style_list' %}" class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-brand-red text-white rounded hover:bg-brand-red-dark">
        {% if style %}Update Style{% else %}Create Style{% endif %}
      </button>
    </div>
  </form>
</div>
{% endblock %}
