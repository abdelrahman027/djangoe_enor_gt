{% extends 'base.html' %}
{% load widget_tweaks %}

{% block title %}Change Password — ENOR.{% endblock %}
{% block style %}
  <style>
    label {
        display: block;
        font-size: small;
        font-weight: 'medium';
        color: #4B5563; /* Tailwind gray-700 */
        margin-bottom: 0.25rem; /* 1 */
    }
    input {
        width: 100%;
        padding: 1rem 1rem!important; /* 2.5 4 */
        border: 1px solid #D1D5DB; /* Tailwind gray-300 */
        border-radius: 0.5rem; /* rounded-lg */
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

  </style>
{% endblock style %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="bg-white rounded-xl shadow-lg overflow-hidden">
    <div class="bg-brand-black px-6 py-8 text-center">
      <h1 class="text-2xl font-bold text-white">Change Password</h1>
    </div>

    <div class="p-8">
      <p class="text-gray-600 mb-6 text-center">
        Update your password to keep your account secure.
      </p>
      <form method="post" class="space-y-4">
        {% csrf_token %}
      {{form.as_p}}
    <button type="submit" class="w-full btn btn-primary py-3 mt-2">
      Update Password
    </button>
        </form>
    </div>
  </div>
</div>
{% endblock %}
