  <!-- ✅ Header -->
<header id="header" class="sticky top-0 z-50 bg-brand-black text-brand-white shadow-md transition-colors duration-300">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <a href="{% url 'home' %}" class="text-2xl font-bold">
          ENOR<span class="text-brand-red">.</span>
        </a>

        <!-- Desktop Nav -->
        <nav class="hidden md:flex space-x-8">
          <a href="{% url 'home' %}" class="font-medium hover:text-brand-red transition-colors">Home</a>
          <a href="#" class="font-medium hover:text-brand-red transition-colors">Shop</a>
          <a href="#" class="font-medium hover:text-brand-red transition-colors">Hot Deals</a>
          <a href="#" class="font-medium hover:text-brand-red transition-colors">About</a>
        </nav>

        <!-- Actions -->
        <div class="flex items-center space-x-4">
          <button class="p-2 hover:text-brand-red focus:outline-none" aria-label="Search">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </button>
          <button class="p-2 hover:text-brand-red focus:outline-none" aria-label="Account">
            {% if user.is_authenticated %}
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            {%else%}
            <span>Login</span>
            {%endif%}
          </button>
          <button class="p-2 hover:text-brand-red focus:outline-none relative" aria-label="Cart">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-brand-red text-brand-white text-xs rounded-full h-5 w-5 flex items-center justify-center">3</span>
          </button>

          <!-- ✅ Mobile Menu Button -->
          <button id="mobile-menu-button" class="md:hidden p-2 rounded-md hover:bg-gray-800 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ✅ Animated Mobile Menu Overlay -->
  <div id="menu-backdrop" class="fixed inset-0 z-40 bg-black bg-opacity-40 transition-opacity duration-300 opacity-0 pointer-events-none"></div>
  <div id="menu-panel" class="fixed inset-x-0 top-16 z-50 bg-brand-black text-brand-white transform -translate-y-[25rem] transition-transform duration-300 ease-in-out">
    <nav class="px-4 pt-4 pb-6 space-y-3">
      <a href="{% url 'home' %}" class="block px-4 py-3 rounded-lg font-medium hover:bg-gray-800 hover:text-brand-red">Home</a>
      <a href="#" class="block px-4 py-3 rounded-lg font-medium hover:bg-gray-800 hover:text-brand-red">Shop</a>
      <a href="#" class="block px-4 py-3 rounded-lg font-medium hover:bg-gray-800 hover:text-brand-red">Collections</a>
      <a href="#" class="block px-4 py-3 rounded-lg font-medium hover:bg-gray-800 hover:text-brand-red">About</a>
    </nav>
  </div>
